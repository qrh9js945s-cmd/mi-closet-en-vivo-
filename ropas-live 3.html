<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RopaLive — Gestión de Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #22223a;
    --border: #2a2a42;
    --accent: #c084fc;
    --accent2: #f0abfc;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --muted2: #4a4a6a;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo span { color: var(--accent); }

  .nav {
    display: flex;
    gap: 4px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .nav-btn.active { color: var(--accent); background: var(--surface2); }

  .main {
    flex: 1;
    padding: 28px 24px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* STATS BAR */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-color, var(--accent));
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent-color, var(--text));
  }

  .stat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
  }

  /* SECTION HEADERS */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  /* BUTTONS */
  .btn {
    border: none;
    border-radius: 10px;
    font-family: var(--font);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    padding: 10px 18px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
  }

  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted2); }

  .btn-danger {
    background: rgba(248,113,113,0.1);
    color: var(--red);
    border: 1px solid rgba(248,113,113,0.2);
  }

  .btn-danger:hover { background: rgba(248,113,113,0.2); }

  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* FORMS */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: var(--mono);
  }

  .field input, .field select, .field textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 14px;
    transition: border-color 0.15s;
    outline: none;
    width: 100%;
  }

  .field textarea { resize: vertical; min-height: 80px; }

  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }

  .field select option { background: var(--surface2); }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-title { font-size: 18px; font-weight: 700; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* ITEMS LIST IN MODAL */
  .items-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
  }

  .item-row {
    display: grid;
    grid-template-columns: 1fr 72px 90px auto;
    gap: 8px;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }

  .item-row select {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 6px;
    outline: none;
    cursor: pointer;
    width: 100%;
  }

  .item-row input {
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    width: 100%;
  }

  .item-row .price-input {
    font-family: var(--mono);
    width: 90px;
    text-align: right;
  }

  .item-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    transition: color 0.15s;
    line-height: 1;
  }

  .item-remove:hover { color: var(--red); }

  .items-total {
    text-align: right;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    font-weight: 500;
    padding-right: 4px;
  }

  /* CARDS */
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: var(--muted2); }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    cursor: pointer;
  }

  .card-name:hover { color: var(--accent); }

  .card-phone {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .badge {
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: 0.3px;
  }

  .badge-green { background: rgba(74,222,128,0.12); color: var(--green); }
  .badge-red { background: rgba(248,113,113,0.12); color: var(--red); }
  .badge-yellow { background: rgba(251,191,36,0.12); color: var(--yellow); }
  .badge-blue { background: rgba(96,165,250,0.12); color: var(--blue); }
  .badge-purple { background: rgba(192,132,252,0.12); color: var(--accent); }
  .badge-gray { background: var(--surface3); color: var(--muted); }

  .card-amount {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  .card-items {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .card-note {
    font-size: 12px;
    color: var(--muted2);
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 10px;
    font-style: italic;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .card-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted2);
    margin-left: auto;
    align-self: flex-end;
  }

  /* SEARCH / FILTERS */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    flex: 1;
    min-width: 200px;
    transition: border-color 0.15s;
  }

  .search-box:focus { border-color: var(--accent); }

  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  .filter-select option { background: var(--surface2); }

  /* CLIENTE FICHA */
  .client-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .client-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
  }

  .client-info { flex: 1; }
  .client-name-big { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .client-phone-big { font-family: var(--mono); font-size: 13px; color: var(--muted); }

  .client-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    text-align: center;
  }

  .client-stat-val { font-size: 20px; font-weight: 700; font-family: var(--mono); }
  .client-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--mono); }

  /* GASTO CARD */
  .expense-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .expense-desc { font-size: 14px; font-weight: 600; }
  .expense-cat { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
  .expense-amount { font-family: var(--mono); font-size: 16px; color: var(--red); font-weight: 500; white-space: nowrap; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-size: 16px; font-weight: 600; color: var(--muted2); }

  /* FRECUENTE STAR */
  .star { color: var(--yellow); font-size: 14px; }

  /* TOASTS */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.2s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  @keyframes slideIn {
    from { transform: translateX(30px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.cols-3 { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .client-stats { grid-template-columns: repeat(3,1fr); }
    header { padding: 0 16px; }
    .main { padding: 20px 16px; }
    .nav-btn { padding: 8px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Ropa<span>Live</span></div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showView('dashboard')">Panel</button>
      <button class="nav-btn" onclick="showView('ventas')">Ventas</button>
      <button class="nav-btn" onclick="showView('clientes')">Clientes</button>
      <button class="nav-btn" onclick="showView('gastos')">Gastos</button>
    </nav>
  </header>

  <div class="main">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="section-head" style="margin-bottom:20px">
        <div class="section-title" style="font-size:22px;font-weight:800;">Resumen</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--muted)" id="dash-date"></div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px">
        <div>
          <div class="section-head"><div class="section-title">Pedidos pendientes</div></div>
          <div id="dash-pending" class="cards"></div>
        </div>
        <div>
          <div class="section-head"><div class="section-title">Últimas ventas</div></div>
          <div id="dash-recent" class="cards"></div>
        </div>
      </div>
    </div>

    <!-- VENTAS -->
    <div class="view" id="view-ventas">
      <div class="section-head">
        <div class="section-title" style="font-size:20px;font-weight:800;">Ventas</div>
        <button class="btn btn-primary" onclick="openSaleModal()">+ Nueva venta</button>
      </div>

      <div class="filters">
        <input class="search-box" type="text" placeholder="Buscar cliente o producto..." id="venta-search" oninput="renderVentas()">
        <select class="filter-select" id="filter-pago" onchange="renderVentas()">
          <option value="">Todos los pagos</option>
          <option value="pagado">Pagado</option>
          <option value="pendiente">Pendiente</option>
        </select>
        <select class="filter-select" id="filter-envio" onchange="renderVentas()">
          <option value="">Todos los envíos</option>
          <option value="pendiente">Sin enviar</option>
          <option value="enviado">Enviado</option>
          <option value="retirado">Retirado</option>
        </select>
        <select class="filter-select" id="filter-talla" onchange="renderVentas()">
          <option value="">Todas las tallas</option>
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="2XL">2XL</option>
          <option value="3XL">3XL</option>
        </select>
      </div>

      <div class="cards" id="ventas-list"></div>
    </div>

    <!-- CLIENTES -->
    <div class="view" id="view-clientes">
      <div class="section-head">
        <div class="section-title" style="font-size:20px;font-weight:800;">Clientes</div>
      </div>

      <div class="filters">
        <input class="search-box" type="text" placeholder="Buscar por nombre o teléfono..." id="cliente-search" oninput="renderClientes()">
      </div>

      <div id="cliente-ficha"></div>
      <div class="cards" id="clientes-list"></div>
    </div>

    <!-- GASTOS -->
    <div class="view" id="view-gastos">
      <div class="section-head">
        <div class="section-title" style="font-size:20px;font-weight:800;">Gastos</div>
        <button class="btn btn-primary" onclick="openExpenseModal()">+ Nuevo gasto</button>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px" id="expense-stats"></div>
      <div class="cards" id="gastos-list"></div>
    </div>

  </div>
</div>

<!-- MODAL VENTA -->
<div class="overlay" id="modal-venta">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-venta-title">Nueva venta</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-venta')">✕</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="form-grid">
        <div class="field">
          <label>Nombre del cliente *</label>
          <input type="text" id="v-nombre" placeholder="Ej: María López" oninput="autoCompleteClient(this.value)">
          <div id="autocomplete-list" style="position:relative;z-index:10"></div>
        </div>
        <div class="field">
          <label>Teléfono</label>
          <input type="tel" id="v-telefono" placeholder="Ej: 70012345">
        </div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>Fecha de venta</label>
          <input type="date" id="v-fecha">
        </div>
      </div>

      <div class="field">
        <label>Artículos *</label>
        <div class="items-list" id="items-list"></div>
        <button class="btn btn-ghost btn-sm" style="align-self:flex-start" onclick="addItem()">+ Agregar artículo</button>
        <div class="items-total" id="items-total">Total: Bs 0</div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>Estado de pago</label>
          <select id="v-pago">
            <option value="pendiente">⏳ Pendiente</option>
            <option value="pagado">✅ Pagado</option>
          </select>
        </div>
        <div class="field">
          <label>Estado de envío</label>
          <select id="v-envio">
            <option value="pendiente">📦 Pendiente</option>
            <option value="enviado">🚚 Enviado a domicilio</option>
            <option value="retirado">🏪 Retirado en persona</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Notas</label>
        <textarea id="v-notas" placeholder="Detalles adicionales, tallas, descuentos, etc."></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-venta')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSale()">Guardar venta</button>
    </div>
  </div>
</div>

<!-- MODAL GASTO -->
<div class="overlay" id="modal-gasto">
  <div class="modal" style="max-width:420px">
    <div class="modal-head">
      <div class="modal-title">Nuevo gasto</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-gasto')">✕</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="field">
        <label>Descripción *</label>
        <input type="text" id="g-desc" placeholder="Ej: Compra de stock">
      </div>
      <div class="form-grid">
        <div class="field">
          <label>Categoría</label>
          <select id="g-cat">
            <option value="Stock">Stock / mercadería</option>
            <option value="Embalaje">Embalaje</option>
            <option value="Envío">Envío / flete</option>
            <option value="Publicidad">Publicidad</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
        <div class="field">
          <label>Monto (Bs) *</label>
          <input type="number" id="g-monto" placeholder="0.00" min="0" step="0.5">
        </div>
      </div>
      <div class="field">
        <label>Fecha del gasto</label>
        <input type="date" id="g-fecha">
      </div>
      <div class="field">
        <label>Notas</label>
        <input type="text" id="g-notas" placeholder="Opcional">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-gasto')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveExpense()">Guardar gasto</button>
    </div>
  </div>
</div>

<!-- MODAL CLIENTE FICHA -->
<div class="overlay" id="modal-cliente">
  <div class="modal" style="max-width:640px">
    <div class="modal-head">
      <div class="modal-title" id="modal-cliente-title">Ficha de cliente</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-cliente')">✕</button>
    </div>
    <div id="modal-cliente-body"></div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// ─── STORAGE ────────────────────────────────────────────────
const DB = {
  save(key, val) { localStorage.setItem('rl_' + key, JSON.stringify(val)); },
  load(key, def = []) {
    try { return JSON.parse(localStorage.getItem('rl_' + key)) ?? def; } catch { return def; }
  }
};

let ventas = DB.load('ventas');
let gastos = DB.load('gastos');

// ─── UTILS ──────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-BO', { day: '2-digit', month: 'short', year: 'numeric' });
}

function todayISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function fmtBs(n) { return 'Bs ' + Number(n || 0).toFixed(2); }

function getClients() {
  const map = {};
  ventas.forEach(v => {
    const key = v.nombre.trim().toLowerCase();
    if (!map[key]) map[key] = { nombre: v.nombre, telefono: v.telefono, ventas: [] };
    map[key].ventas.push(v);
    if (v.telefono) map[key].telefono = v.telefono;
  });
  return map;
}

function toast(msg, color = var_green) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span style="color:${color}">●</span> ${msg}`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

const var_green = '#4ade80';
const var_red = '#f87171';
const var_yellow = '#fbbf24';

// ─── NAV ────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(name === 'dashboard' ? 'panel' : name.slice(0,4))) b.classList.add('active');
  });

  // Close client detail if switching view
  document.getElementById('cliente-ficha').innerHTML = '';

  if (name === 'dashboard') renderDashboard();
  if (name === 'ventas') renderVentas();
  if (name === 'clientes') renderClientes();
  if (name === 'gastos') renderGastos();
}

// ─── DASHBOARD ──────────────────────────────────────────────
function renderDashboard() {
  const now = new Date();
  document.getElementById('dash-date').textContent = now.toLocaleDateString('es-BO', { weekday: 'long', day: 'numeric', month: 'long' });

  const pagadas = ventas.filter(v => v.pago === 'pagado');
  const pendPago = ventas.filter(v => v.pago === 'pendiente');
  const pendEnvio = ventas.filter(v => v.envio === 'pendiente');
  const totalIngreso = pagadas.reduce((s, v) => s + v.total, 0);
  const totalPendiente = pendPago.reduce((s, v) => s + v.total, 0);
  const totalGastos = gastos.reduce((s, g) => s + g.monto, 0);
  const ganancia = totalIngreso - totalGastos;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card" style="--accent-color:var(--green)">
      <div class="stat-label">Ingresos cobrados</div>
      <div class="stat-value">${fmtBs(totalIngreso)}</div>
      <div class="stat-sub">${pagadas.length} ventas pagadas</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--yellow)">
      <div class="stat-label">Por cobrar</div>
      <div class="stat-value">${fmtBs(totalPendiente)}</div>
      <div class="stat-sub">${pendPago.length} ventas pendientes</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--red)">
      <div class="stat-label">Gastos totales</div>
      <div class="stat-value">${fmtBs(totalGastos)}</div>
      <div class="stat-sub">${gastos.length} registros</div>
    </div>
    <div class="stat-card" style="--accent-color:${ganancia >= 0 ? 'var(--green)' : 'var(--red)'}">
      <div class="stat-label">Ganancia neta</div>
      <div class="stat-value">${fmtBs(ganancia)}</div>
      <div class="stat-sub">ingresos − gastos</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--blue)">
      <div class="stat-label">Por enviar</div>
      <div class="stat-value">${pendEnvio.length}</div>
      <div class="stat-sub">pedidos pendientes</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--accent)">
      <div class="stat-label">Total ventas</div>
      <div class="stat-value">${ventas.length}</div>
      <div class="stat-sub">${Object.keys(getClients()).length} clientes</div>
    </div>
  `;

  // Pending orders
  const pending = ventas.filter(v => v.envio === 'pendiente').slice(0, 4);
  document.getElementById('dash-pending').innerHTML = pending.length
    ? pending.map(v => miniCard(v)).join('')
    : '<div class="empty"><div class="empty-icon">✓</div><div class="empty-text">Sin pedidos pendientes</div></div>';

  // Recent
  const recent = [...ventas].sort((a, b) => b.fecha - a.fecha).slice(0, 4);
  document.getElementById('dash-recent').innerHTML = recent.length
    ? recent.map(v => miniCard(v)).join('')
    : '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Sin ventas aún</div></div>';
}

function miniCard(v) {
  return `<div class="card" style="padding:12px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
      <div>
        <div style="font-weight:700;font-size:14px">${v.nombre}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${v.items.map(i => i.nombre).join(', ')}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="badge ${v.pago === 'pagado' ? 'badge-green' : 'badge-yellow'}">${v.pago === 'pagado' ? 'Pagado' : 'Pendiente'}</span>
        <span style="font-family:var(--mono);font-size:13px">${fmtBs(v.total)}</span>
      </div>
    </div>
  </div>`;
}

// ─── VENTAS ─────────────────────────────────────────────────
function renderVentas() {
  const search = document.getElementById('venta-search').value.toLowerCase();
  const filterPago = document.getElementById('filter-pago').value;
  const filterEnvio = document.getElementById('filter-envio').value;
  const filterTalla = document.getElementById('filter-talla').value;

  let list = [...ventas].sort((a, b) => b.fecha - a.fecha);

  if (search) list = list.filter(v =>
    v.nombre.toLowerCase().includes(search) ||
    v.items.some(i => i.nombre.toLowerCase().includes(search))
  );
  if (filterPago) list = list.filter(v => v.pago === filterPago);
  if (filterEnvio) list = list.filter(v => v.envio === filterEnvio);
  if (filterTalla) list = list.filter(v => v.items.some(i => i.talla === filterTalla));

  const el = document.getElementById('ventas-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🛍️</div><div class="empty-text">Sin resultados</div></div>';
    return;
  }

  el.innerHTML = list.map(v => `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-name" onclick="openClientModal('${escKey(v.nombre)}')">${v.nombre}</div>
          ${v.telefono ? `<div class="card-phone">📱 ${v.telefono}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="card-amount">${fmtBs(v.total)}</div>
          <div style="display:flex;gap:5px">
            <span class="badge ${v.pago === 'pagado' ? 'badge-green' : 'badge-yellow'}">${v.pago === 'pagado' ? '✓ Pagado' : '⏳ Pendiente'}</span>
          </div>
        </div>
      </div>
      <div class="card-items">${v.items.map(i => `${i.nombre}${i.talla ? ` <span class="badge badge-gray" style="padding:1px 7px;font-size:10px">${i.talla}</span>` : ''} — <span style="font-family:var(--mono)">${fmtBs(i.precio)}</span>`).join('<br>')}</div>
      ${v.notas ? `<div class="card-note">💬 ${v.notas}</div>` : ''}
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div class="card-actions">
          ${v.pago !== 'pagado' ? `<button class="btn btn-ghost btn-sm" onclick="togglePago('${v.id}')">Marcar pagado</button>` : ''}
          <button class="btn btn-ghost btn-sm" onclick="cycleEnvio('${v.id}')">${envioLabel(v.envio)}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteVenta('${v.id}')">Eliminar</button>
        </div>
        <div class="card-date">${fmtDate(v.fecha)}</div>
      </div>
    </div>
  `).join('');
}

function envioLabel(e) {
  if (e === 'pendiente') return '📦 Sin enviar';
  if (e === 'enviado') return '🚚 Enviado';
  return '🏪 Retirado';
}

function envioNext(e) {
  if (e === 'pendiente') return 'enviado';
  if (e === 'enviado') return 'retirado';
  return 'pendiente';
}

function togglePago(id) {
  const v = ventas.find(x => x.id === id);
  if (!v) return;
  v.pago = v.pago === 'pagado' ? 'pendiente' : 'pagado';
  DB.save('ventas', ventas);
  renderVentas();
  toast('Estado de pago actualizado', var_green);
}

function cycleEnvio(id) {
  const v = ventas.find(x => x.id === id);
  if (!v) return;
  v.envio = envioNext(v.envio);
  DB.save('ventas', ventas);
  renderVentas();
  toast('Estado de envío actualizado', var_green);
}

function deleteVenta(id) {
  if (!confirm('¿Eliminar esta venta?')) return;
  ventas = ventas.filter(v => v.id !== id);
  DB.save('ventas', ventas);
  renderVentas();
  toast('Venta eliminada', var_red);
}

function escKey(s) { return s.replace(/'/g, "\\'"); }

// ─── CLIENTES ───────────────────────────────────────────────
function renderClientes() {
  const search = document.getElementById('cliente-search').value.toLowerCase();
  const clients = getClients();
  let list = Object.values(clients);

  if (search) list = list.filter(c =>
    c.nombre.toLowerCase().includes(search) ||
    (c.telefono || '').includes(search)
  );

  list.sort((a, b) => b.ventas.length - a.ventas.length);

  const el = document.getElementById('clientes-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Sin clientes aún</div></div>';
    return;
  }

  el.innerHTML = list.map(c => {
    const total = c.ventas.reduce((s, v) => s + v.total, 0);
    const deuda = c.ventas.filter(v => v.pago === 'pendiente').reduce((s, v) => s + v.total, 0);
    const frecuente = c.ventas.length >= 3;
    return `
      <div class="card">
        <div class="card-head">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="client-avatar" style="width:40px;height:40px;font-size:16px">${c.nombre.charAt(0).toUpperCase()}</div>
            <div>
              <div class="card-name" onclick="openClientModal('${escKey(c.nombre)}')">${c.nombre} ${frecuente ? '<span class="star" title="Cliente frecuente">★</span>' : ''}</div>
              ${c.telefono ? `<div class="card-phone">📱 ${c.telefono}</div>` : ''}
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-family:var(--mono);font-size:16px;font-weight:600">${fmtBs(total)}</div>
            <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${c.ventas.length} compra${c.ventas.length > 1 ? 's' : ''}</div>
            ${deuda > 0 ? `<div style="font-size:11px;color:var(--red);font-family:var(--mono)">Debe ${fmtBs(deuda)}</div>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${frecuente ? '<span class="badge badge-yellow">★ Frecuente</span>' : ''}
          ${deuda > 0 ? '<span class="badge badge-red">Deuda pendiente</span>' : '<span class="badge badge-green">Al día</span>'}
          <button class="btn btn-ghost btn-sm" onclick="openSaleModal('${escKey(c.nombre)}','${c.telefono||''}')">+ Nueva venta</button>
          <button class="btn btn-ghost btn-sm" onclick="openClientModal('${escKey(c.nombre)}')">Ver historial</button>
        </div>
      </div>
    `;
  }).join('');
}

function openClientModal(nombre) {
  const clients = getClients();
  const key = nombre.trim().toLowerCase();
  const c = clients[key];
  if (!c) return;

  const total = c.ventas.reduce((s, v) => s + v.total, 0);
  const cobrado = c.ventas.filter(v => v.pago === 'pagado').reduce((s, v) => s + v.total, 0);
  const deuda = total - cobrado;
  const frecuente = c.ventas.length >= 3;

  document.getElementById('modal-cliente-title').textContent = 'Ficha: ' + c.nombre;
  document.getElementById('modal-cliente-body').innerHTML = `
    <div class="client-header" style="background:var(--surface2);margin-bottom:16px">
      <div class="client-avatar">${c.nombre.charAt(0).toUpperCase()}</div>
      <div class="client-info">
        <div class="client-name-big">${c.nombre} ${frecuente ? '<span class="star">★</span>' : ''}</div>
        <div class="client-phone-big">${c.telefono || 'Sin teléfono'}</div>
      </div>
      <div class="client-stats">
        <div><div class="client-stat-val">${c.ventas.length}</div><div class="client-stat-lbl">Compras</div></div>
        <div><div class="client-stat-val" style="color:var(--green)">${fmtBs(cobrado)}</div><div class="client-stat-lbl">Cobrado</div></div>
        <div><div class="client-stat-val" style="color:${deuda > 0 ? 'var(--red)' : 'var(--muted)'}">${fmtBs(deuda)}</div><div class="client-stat-lbl">Deuda</div></div>
      </div>
    </div>
    <div style="font-weight:700;font-size:14px;margin-bottom:12px">Historial de compras</div>
    ${[...c.ventas].sort((a, b) => b.fecha - a.fecha).map(v => `
      <div class="card" style="margin-bottom:8px;padding:14px 16px">
        <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:8px">
          <div style="font-size:13px">${v.items.map(i => `${i.nombre}${i.talla ? ` <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">[${i.talla}]</span>` : ''} — ${fmtBs(i.precio)}`).join(', ')}</div>
          <div style="font-family:var(--mono);font-weight:600;white-space:nowrap">${fmtBs(v.total)}</div>
        </div>
        ${v.notas ? `<div class="card-note" style="margin-bottom:8px">💬 ${v.notas}</div>` : ''}
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span class="badge ${v.pago === 'pagado' ? 'badge-green' : 'badge-yellow'}">${v.pago === 'pagado' ? '✓ Pagado' : '⏳ Por cobrar'}</span>
          <span class="badge ${v.envio === 'enviado' ? 'badge-blue' : v.envio === 'retirado' ? 'badge-purple' : 'badge-gray'}">${envioLabel(v.envio)}</span>
          <div style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)">${fmtDate(v.fecha)}</div>
        </div>
      </div>
    `).join('')}
    <div style="margin-top:16px">
      <button class="btn btn-primary" onclick="closeModal('modal-cliente');openSaleModal('${escKey(c.nombre)}','${c.telefono||''}')">+ Nueva venta para este cliente</button>
    </div>
  `;

  document.getElementById('modal-cliente').classList.add('open');
}

// ─── GASTOS ─────────────────────────────────────────────────
function renderGastos() {
  const totalGastos = gastos.reduce((s, g) => s + g.monto, 0);
  const totalIngresos = ventas.filter(v => v.pago === 'pagado').reduce((s, v) => s + v.total, 0);
  const neta = totalIngresos - totalGastos;

  document.getElementById('expense-stats').innerHTML = `
    <div class="stat-card" style="--accent-color:var(--red)">
      <div class="stat-label">Total gastos</div>
      <div class="stat-value">${fmtBs(totalGastos)}</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--green)">
      <div class="stat-label">Ingresos cobrados</div>
      <div class="stat-value">${fmtBs(totalIngresos)}</div>
    </div>
    <div class="stat-card" style="--accent-color:${neta >= 0 ? 'var(--green)' : 'var(--red)'}">
      <div class="stat-label">Ganancia neta</div>
      <div class="stat-value">${fmtBs(neta)}</div>
    </div>
  `;

  const el = document.getElementById('gastos-list');
  const sorted = [...gastos].sort((a, b) => b.fecha - a.fecha);
  if (!sorted.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">💸</div><div class="empty-text">Sin gastos registrados</div></div>';
    return;
  }

  el.innerHTML = sorted.map(g => `
    <div class="expense-card">
      <div>
        <div class="expense-desc">${g.desc}</div>
        <div class="expense-cat">${g.cat} · ${fmtDate(g.fecha)}</div>
        ${g.notas ? `<div style="font-size:11px;color:var(--muted2);margin-top:2px">${g.notas}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="expense-amount">${fmtBs(g.monto)}</div>
        <button class="btn btn-danger btn-sm" onclick="deleteGasto('${g.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function deleteGasto(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  gastos = gastos.filter(g => g.id !== id);
  DB.save('gastos', gastos);
  renderGastos();
  toast('Gasto eliminado', var_red);
}

// ─── MODAL VENTA ────────────────────────────────────────────
let editingId = null;
let saleItems = [];

function openSaleModal(nombre = '', telefono = '') {
  editingId = null;
  document.getElementById('modal-venta-title').textContent = 'Nueva venta';
  document.getElementById('v-nombre').value = nombre;
  document.getElementById('v-telefono').value = telefono;
  document.getElementById('v-pago').value = 'pendiente';
  document.getElementById('v-envio').value = 'pendiente';
  document.getElementById('v-notas').value = '';
  document.getElementById('v-fecha').value = todayISO();
  document.getElementById('autocomplete-list').innerHTML = '';
  saleItems = [{ id: uid(), nombre: '', precio: 0, talla: '' }];
  renderItems();
  document.getElementById('modal-venta').classList.add('open');
}

function renderItems() {
  const tallas = ['XS','S','M','L','XL','2XL','3XL'];
  const list = document.getElementById('items-list');
  list.innerHTML = saleItems.map((item, i) => `
    <div class="item-row">
      <input type="text" placeholder="Nombre del artículo" value="${item.nombre}" oninput="saleItems[${i}].nombre=this.value">
      <select onchange="saleItems[${i}].talla=this.value">
        <option value="">Talla</option>
        ${tallas.map(t => `<option value="${t}" ${item.talla===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <input type="number" class="price-input" placeholder="0.00" value="${item.precio || ''}" min="0" step="0.5" oninput="saleItems[${i}].precio=parseFloat(this.value)||0;updateTotal()">
      <button class="item-remove" onclick="removeItem(${i})">✕</button>
    </div>
  `).join('');
  updateTotal();
}

function addItem() {
  saleItems.push({ id: uid(), nombre: '', precio: 0 });
  renderItems();
}

function removeItem(i) {
  if (saleItems.length === 1) return;
  saleItems.splice(i, 1);
  renderItems();
}

function updateTotal() {
  const t = saleItems.reduce((s, i) => s + (i.precio || 0), 0);
  document.getElementById('items-total').textContent = 'Total: ' + fmtBs(t);
}

function autoCompleteClient(val) {
  const el = document.getElementById('autocomplete-list');
  if (!val || val.length < 2) { el.innerHTML = ''; return; }
  const clients = getClients();
  const matches = Object.values(clients).filter(c => c.nombre.toLowerCase().includes(val.toLowerCase())).slice(0, 4);
  if (!matches.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div style="position:absolute;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:4px">
    ${matches.map(c => `<div style="padding:10px 14px;cursor:pointer;font-size:13px;transition:background 0.1s" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background=''" onclick="selectClient('${escKey(c.nombre)}','${c.telefono||''}')">
      <strong>${c.nombre}</strong> ${c.telefono ? `<span style="color:var(--muted);font-family:var(--mono)">· ${c.telefono}</span>` : ''}
    </div>`).join('')}
  </div>`;
}

function selectClient(nombre, telefono) {
  document.getElementById('v-nombre').value = nombre;
  document.getElementById('v-telefono').value = telefono;
  document.getElementById('autocomplete-list').innerHTML = '';
}

function saveSale() {
  const nombre = document.getElementById('v-nombre').value.trim();
  if (!nombre) { toast('El nombre del cliente es obligatorio', var_red); return; }

  const validItems = saleItems.filter(i => i.nombre.trim());
  if (!validItems.length) { toast('Agrega al menos un artículo', var_red); return; }

  const fechaVal = document.getElementById('v-fecha').value;
  const fecha = fechaVal ? new Date(fechaVal + 'T12:00:00').getTime() : Date.now();

  const venta = {
    id: editingId || uid(),
    nombre,
    telefono: document.getElementById('v-telefono').value.trim(),
    items: validItems,
    total: validItems.reduce((s, i) => s + (i.precio || 0), 0),
    pago: document.getElementById('v-pago').value,
    envio: document.getElementById('v-envio').value,
    notas: document.getElementById('v-notas').value.trim(),
    fecha
  };

  if (editingId) {
    const idx = ventas.findIndex(v => v.id === editingId);
    ventas[idx] = venta;
  } else {
    ventas.unshift(venta);
  }

  DB.save('ventas', ventas);
  closeModal('modal-venta');
  toast('Venta guardada ✓', var_green);

  // Refresh whichever view is active
  if (document.getElementById('view-ventas').classList.contains('active')) renderVentas();
  if (document.getElementById('view-clientes').classList.contains('active')) renderClientes();
  if (document.getElementById('view-dashboard').classList.contains('active')) renderDashboard();
}

// ─── MODAL GASTO ────────────────────────────────────────────
function openExpenseModal() {
  document.getElementById('g-desc').value = '';
  document.getElementById('g-monto').value = '';
  document.getElementById('g-notas').value = '';
  document.getElementById('g-cat').value = 'Stock';
  document.getElementById('g-fecha').value = todayISO();
  document.getElementById('modal-gasto').classList.add('open');
}

function saveExpense() {
  const desc = document.getElementById('g-desc').value.trim();
  const monto = parseFloat(document.getElementById('g-monto').value);
  if (!desc) { toast('La descripción es obligatoria', var_red); return; }
  if (!monto || monto <= 0) { toast('Ingresa un monto válido', var_red); return; }

  const fechaVal = document.getElementById('g-fecha').value;
  const fecha = fechaVal ? new Date(fechaVal + 'T12:00:00').getTime() : Date.now();

  gastos.unshift({
    id: uid(),
    desc,
    cat: document.getElementById('g-cat').value,
    monto,
    notas: document.getElementById('g-notas').value.trim(),
    fecha
  });

  DB.save('gastos', gastos);
  closeModal('modal-gasto');
  toast('Gasto guardado ✓', var_green);
  if (document.getElementById('view-gastos').classList.contains('active')) renderGastos();
  if (document.getElementById('view-dashboard').classList.contains('active')) renderDashboard();
}

// ─── MODALS ─────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) o.classList.remove('open');
  });
});

// ─── INIT ───────────────────────────────────────────────────
renderDashboard();
</script>
</body>
</html>
